name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clone the Hugging Face Space repository into a subfolder
          git clone https://dev-mzeeshan:$HF_TOKEN@huggingface.co/spaces/dev-mzeeshan/customer-feedback-analyzer hf_space
          
          # 2. Copy only the updated code files into that folder
          cp app.py hf_space/
          cp analyzer.py hf_space/
          
          # 3. Go into the folder, commit specific changes, and push
          cd hf_space
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Only add the files you want to update
          git add app.py analyzer.py
          
          # Commit only if there are changes
          git commit -m "Update app logic only" || echo "No changes to commit"
          
          # Push back to Hugging Face
          git push origin main